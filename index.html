<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl — YouTube Audio Queue</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo"><span class="logo-mark"></span> Vinyl</div>
  <form class="add-bar" id="addForm">
    <input id="urlInput" type="text" placeholder="Paste a YouTube link and hit Enter…" autocomplete="off" inputmode="url">
    <button type="submit" class="btn btn-accent" id="addBtn">Add to queue</button>
  </form>
</header>
<div id="statusMsg"></div>

<main>
  <div id="emptyState" class="empty-state">
    <span class="glyph">♪</span>
    Your queue is empty. Paste a YouTube video URL above to start listening.
  </div>

  <div id="queueWrap" style="display:none;">
    <div class="queue-head">
      <h2 id="queueCount">Queue · 0</h2>
      <button id="clearBtn" type="button">Clear all</button>
    </div>
    <ul id="queueList"></ul>
  </div>
</main>

<footer class="hint">
  <kbd>Space</kbd> play/pause &nbsp; <kbd>←/→</kbd> seek 10s &nbsp; <kbd>Shift+←/→</kbd> seek 30s &nbsp;
  <kbd>↑/↓</kbd> volume &nbsp; <kbd>N</kbd> next &nbsp; <kbd>P</kbd> prev &nbsp; <kbd>S</kbd> shuffle &nbsp; <kbd>R</kbd> repeat
</footer>

<div id="playerBar">
  <div id="ytHost"><div id="ytPlayer"></div></div>

  <div class="np-info">
    <img id="npThumb" src="" alt="" style="display:none;">
    <div class="np-text">
      <div class="np-title" id="npTitle">Nothing playing</div>
      <div class="np-sub" id="npSub">Add a track to begin</div>
    </div>
  </div>

  <div class="np-center">
    <div class="transport">
      <button id="shuffleBtn" title="Shuffle (S)">🔀</button>
      <button id="prevBtn" title="Previous">⏮</button>
      <button id="playBtn" title="Play/Pause (Space)">▶</button>
      <button id="nextBtn" title="Next">⏭</button>
      <button id="repeatBtn" title="Repeat (R)">🔁</button>
    </div>
    <div class="seek-row">
      <span id="curTime">0:00</span>
      <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
      <span id="durTime">0:00</span>
    </div>
  </div>

  <div class="np-right">
    <div class="seek-jump">
      <button data-jump="-30">-30s</button>
      <button data-jump="-10">-10s</button>
      <button data-jump="10">+10s</button>
      <button data-jump="30">+30s</button>
    </div>
    <select class="speed-select" id="speedSelect" title="Playback speed">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="0.75">0.75×</option>
      <option value="1" selected>1×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="1.75">1.75×</option>
      <option value="2">2×</option>
    </select>
    <div class="vol-wrap">
      <button id="muteBtn" title="Mute">🔊</button>
      <input type="range" id="volBar" min="0" max="100" value="80">
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
